# @package _global_

defaults:
  - dreamer_v3
  - override /algo: dreamer_v3_S
  - override /env: retro_dreamer
  - _self_

# Experiment
seed: 42

# Environment — game_id, game_dir, initial_state set via CLI overrides
env:
  num_envs: 8
  # No frame stacking — the RSSM carries motion; the DreamerV3 paper uses
  # none. The old "4" here was never live: dreamer_v3.py force-stamps
  # frame_stack=-1 at startup ("These arguments cannot be changed").
  frame_stack: 1
  frame_skip: 4
  max_episode_steps: 10000
  capture_video: True
  video_freq: 5000

# NOTE: the dashboard launcher (backend/training/trainer.py) stamps
# checkpoint.every, metric.log_every, and env.video_freq via CLI on every
# start (currently 1000 / 100 / 10). The values below apply only to manual
# `sheeprl` launches without those overrides.

# Checkpoint
checkpoint:
  every: 10000
  save_last: True

# Buffer
buffer:
  size: 500_000
  checkpoint: True
  memmap: True

# Algorithm
algo:
  total_steps: 5_000_000
  per_rank_batch_size: 16
  learning_starts: 10000
  cnn_keys:
    encoder:
      - rgb
  mlp_keys:
    encoder: []
  # CNN widths come from the algo size preset (S=32, L=64, ...) — an
  # encoder-only 48 override here would give L a mismatched encoder/decoder.
  actor:
    cls: sheeprl.algos.dreamer_v3.agent.Actor
    # Paper value (fixed across 150+ tasks). The old 0.002 (6.7x) was an
    # early hand-tune, never A/B'd — audited out 2026-07-09 alongside the
    # reverse-done trap it was compensating for.
    ent_coef: 3e-4
  critic:
    cls: sheeprl.algos.dreamer_v3.agent.Critic

# (A root-level `optim:` block used to live here — dead config: dreamer_v3
# instantiates per-component optimizers from algo.world_model/actor/critic.)

# Metric
metric:
  log_every: 5000
  log_video: True

# Fabric
fabric:
  accelerator: cuda
  devices: 1
  precision: 16-mixed
